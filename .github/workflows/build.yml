env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-west-2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - prod
          - stage
          - dev

jobs:
  build:
    name: build and push

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "BUILDER_BASE_IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/digitalvenue/builder-base:latest" >> $GITHUB_ENV
      - run: echo "IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/digitalvenue/lambda-build" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - run: aws cloudformation deploy --template-file .cloudformation/base-ecr.yml --stack-name digitalvenue-lambda-build-ecr --parameter-overrides Image=lambda-build

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # All images are tagged with the current SHA, but we use the latest tag for build caching
      - name: push ${{ env.IMAGE }}:latest
        run: docker buildx build --push --provenance false --platform linux/arm64 -t ${{ env.IMAGE }}:latest --build-arg BUILDKIT_INLINE_CACHE=1 --build-arg BUILD=${{ env.BUILDER_BASE_IMAGE }} --cache-from "type=registry,ref=${{ env.IMAGE }}:latest-cache" --cache-from "type=registry,ref=${{ env.IMAGE }}:latest" --cache-to "mode=max,image-manifest=true,oci-mediatypes=true,type=registry,ref=${{ env.IMAGE }}:latest-cache" --file docker/lambda-build.Dockerfile .
      - name: push ${{ env.IMAGE }}:${{ github.sha }}
        run: docker buildx build --push --provenance false --platform linux/arm64 -t ${{ env.IMAGE }}:${{ github.sha }} --build-arg BUILDKIT_INLINE_CACHE=1 --build-arg BUILD=${{ env.BUILDER_BASE_IMAGE }} --cache-from "type=registry,ref=${{ env.IMAGE }}:latest-cache" --cache-from "type=registry,ref=${{ env.IMAGE }}:latest" --file docker/lambda-build.Dockerfile .
