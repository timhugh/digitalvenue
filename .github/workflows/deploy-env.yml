name: deploy-env

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-west-2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - prod
          - stage
          - dev

jobs:
  baseImages:
    strategy:
      matrix:
        image:
          - builder
          - runner

    name: build and push ${{ matrix.image }} image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - run: echo "VERSION=$(cat docker/${{ matrix.image }}-version.txt)" >> $GITHUB_ENV
      - run: echo "IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/digitalvenue/${{ matrix.image }}" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - run: aws cloudformation deploy --template-file .cloudformation/base-ecr.yml --stack-name digitalvenue-${{ matrix.image }}-ecr --parameter-overrides Image=${{ matrix.image }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: push ${{ env.IMAGE }}:${{ github.sha }}
        run: docker buildx build --push --provenance false --platform linux/arm64 -t ${{ env.IMAGE }}:${{ github.sha }} --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "type=registry,ref=${{ env.IMAGE }}:${{ env.VERSION }}-cache" --cache-to "mode=max,image-manifest=true,oci-mediatypes=true,type=registry,ref=${{ env.IMAGE }}:${{ env.VERSION }}-cache" --file docker/${{ matrix.image }}.Dockerfile .
      # it's okay if this fails, b/c tags are immutable and it might already exist
      - name: push ${{ env.IMAGE }}:${{ env.VERSION }}
        run: docker buildx build --push --provenance false --platform linux/arm64 -t ${{ env.IMAGE }}:${{ env.VERSION }} --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "type=registry,ref=${{ env.IMAGE }}:${{ env.VERSION }}-cache" --cache-to "mode=max,image-manifest=true,oci-mediatypes=true,type=registry,ref=${{ env.IMAGE }}:${{ env.VERSION }}-cache" --file docker/${{ matrix.image }}.Dockerfile . || true

  buildAndDeployInfra:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "STACK_PREFIX=digitalvenue-${{ github.event.inputs.environment }}" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: deploy lambda IAM role
        run: aws cloudformation deploy --template-file .cloudformation/lambda-role.yml --stack-name ${{ env.STACK_PREFIX }}-lambda-role --capabilities CAPABILITY_IAM

      - name: deploy lambda api gateway
        run: aws cloudformation deploy --template-file .cloudformation/lambda-gateway.yml --stack-name ${{ env.STACK_PREFIX }}-lambda-gateway --parameter-overrides Environment=${{ github.event.inputs.environment }}

  buildAndDeployLambdas:
    needs: [baseImages, buildAndDeployInfra]

    strategy:
      matrix:
        lambdas:
          - lambda-test

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # TODO: get builder and runner versions for this specific lambda
      - run: echo "BUILDER_VERSION=$(cat docker/builder-version.txt)" >> $GITHUB_ENV
      - run: echo "RUNNER_VERSION=$(cat docker/runner-version.txt)" >> $GITHUB_ENV
      - run: echo "BUILDER_IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/digitalvenue/builder:${{ env.BUILDER_VERSION }}" >> $GITHUB_ENV
      - run: echo "RUNNER_IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/digitalvenue/runner:${{ env.RUNNER_VERSION }}" >> $GITHUB_ENV
      - run: echo "LAMBDA_IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/digitalvenue/${{ matrix.lambdas }}:${{ github.sha }}" >> $GITHUB_ENV
      - run: echo "STACK_PREFIX=digitalvenue-${{ github.event.inputs.environment }}" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: deploy ${{ matrix.lambdas }} ECR
        run: aws cloudformation deploy --template-file ${{ matrix.lambdas }}/ecr.yml --stack-name digitalvenue-${{ matrix.lambdas}}-ecr

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/amazon-ecr-login@v2

      - run: docker buildx build --push --provenance false --platform linux/arm64 -t ${{ env.LAMBDA_IMAGE }} --build-arg BUILDER=${{ env.BUILDER_IMAGE }} --build-arg RUNNER=${{ env.RUNNER_IMAGE }} ${{ matrix.lambdas }}

      - name: deploy ${{ matrix.lambdas }} lambda
        run: aws cloudformation deploy --template-file ${{ matrix.lambdas }}/lambda.yml --stack-name ${{ env.STACK_PREFIX }}-${{ matrix.lambdas}} --parameter-overrides LambdaTestECRStackName=digitalvenue-${{ matrix.lambdas}}-ecr LambdaRoleStackName=${{ env.STACK_PREFIX }}-lambda-role ImageVersion=${{ github.sha }}

      - name: deploy ${{ matrix.lambdas }} api
        run: aws cloudformation deploy --template-file ${{matrix.lambdas }}/api.yml --stack-name ${{ env.STACK_PREFIX }}-${{ matrix.lambdas}}-api --parameter-overrides LambdaTestStackName=${{ env.STACK_PREFIX }}-${{ matrix.lambdas}} LambdaGatewayStackName=${{ env.STACK_PREFIX }}-lambda-gateway

  deployApiGateway:
    needs: [ buildAndDeployInfra, buildAndDeployLambdas ]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "STACK_PREFIX=digitalvenue-${{ github.event.inputs.environment }}" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: deploy api gateway
        run: aws cloudformation deploy --template-file .cloudformation/lambda-gateway-deployment.yml --stack-name ${{ env.STACK_PREFIX }}-lambda-gateway-deployment --parameter-overrides LambdaGatewayStackName=${{ env.STACK_PREFIX }}-lambda-gateway
