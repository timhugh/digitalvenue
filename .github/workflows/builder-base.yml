env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-west-2

on:
  workflow_dispatch:

jobs:
  buildAndPush:
    name: build and push builder-base image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - run: echo "IMAGE=builder-base" >> $GITHUB_ENV
      - run: echo "IMAGE_TAG=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/digitalvenue/${{ env.IMAGE }}" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - run: aws cloudformation deploy --template-file .cloudformation/base-ecr.yml --stack-name digitalvenue-${{ env.IMAGE }}-ecr --parameter-overrides Image=${{ env.IMAGE }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # All images are tagged with the current SHA, but we use the latest tag for build caching
      - name: push ${{ env.IMAGE_TAG }}:latest
        run: docker buildx build --push --provenance false --platform linux/arm64 -t ${{ env.IMAGE_TAG }}:latest --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "type=registry,ref=${{ env.IMAGE_TAG }}:latest-cache" --cache-from "type=registry,ref=${{ env.IMAGE_TAG }}:latest" --cache-to "mode=max,image-manifest=true,oci-mediatypes=true,type=registry,ref=${{ env.IMAGE_TAG }}:latest-cache" --file docker/${{ env.IMAGE }}.Dockerfile .
      - name: push ${{ env.IMAGE_TAG }}:${{ github.sha }}
        run: docker buildx build --push --provenance false --platform linux/arm64 -t ${{ env.IMAGE_TAG }}:${{ github.sha }} --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "type=registry,ref=${{ env.IMAGE_TAG }}:latest-cache" --cache-from "type=registry,ref=${{ env.IMAGE_TAG }}:latest" --file docker/${{ env.IMAGE }}.Dockerfile .
