AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Environment:
    Type: String
  CodeBucketName:
    Type: String
  Route53HostedZoneId:
    Type: String
  PapertrailLogPushURL:
    Type: String

Resources:

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'digitalvenue-api-${Environment}'
      ProtocolType: HTTP

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: !Ref Environment
      ApiId: !Ref Api
      AutoDeploy: true
      AccessLogSettings:
        Format: '{
                  "httpMethod": "$context.httpMethod",
                  "path": "$context.path",
                  "environment": "$context.stage",
                  "requestId": "$context.requestId",
                  "ip": "$context.identity.sourceIp",
                  "userAgent": "$context.identity.userAgent",
                  "latency": "$context.responseLatency",
                  "httpStatus": "$context.status",
                  "integrationError": "$context.integration.error",
                  "lambdaError": "$context.error.message"
        }'
        DestinationArn: !GetAtt ApiLogGroup.Arn

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 3
      LogGroupName: !Sub '/digitalvenue/api/${Environment}'

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: !Ref DomainName
      ApiId: !Ref Api
      Stage: !Ref ApiStage

  DnsRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Sub 'api.${Environment}.digital-venue.net'
      Type: A
      AliasTarget:
        DNSName: !GetAtt DomainName.RegionalDomainName
        HostedZoneId: !GetAtt DomainName.RegionalHostedZoneId

  DomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref DomainCertificate
          SecurityPolicy: TLS_1_2

  DomainCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainValidationOptions:
        - DomainName: !Sub 'api.${Environment}.digital-venue.net'
          HostedZoneId: !Ref Route53HostedZoneId
      ValidationMethod: DNS

  CoreDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digitalvenue-core-data-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK # partition key
          AttributeType: S
        - AttributeName: SK # sort key
          AttributeType: S
        - AttributeName: CustomerID # CustomerID is on Customers, Orders, and Tickets
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: CustomerIDIndex
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: CustomerID
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  TicketsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "digitalvenue-tickets-${Environment}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false

  TemplatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "digitalvenue-templates-${Environment}"

  TenantFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "digitalvenue-tenant-files-${Environment}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false

  SquarePaymentCreatedEventQueue:
    Type: AWS::SQS::Queue
    Properties:
#      RedrivePolicy:
#        deadLetterTargetArn: !GetAtt SquarePaymentCreatedEventDLQueue.Arn
#        maxReceiveCount: 5
      VisibilityTimeout: 60
#
#  SquarePaymentCreatedEventDLQueue:
#    Type: AWS::SQS::Queue
#
#  SquarePaymentCreatedEventQueueRole:
#    Type: AWS::IAM:Role
#    Properties:
#      Policies:
#        - PolicyName: SquarePaymentCreatedEventQueueDeadLetterPolicy
#          PolicyDocument:
#            Version: "2012-10-17"
#            Statement:
#              - Effect: Allow
#                Action:
#                  - sqs:StartMessageMoveTask
#                  - sqs:CancelMessageMoveTask
#                  - sqs:ListMessageMoveTasks
#                  - sqs:ReceiveMessage
#                  - sqs:DeleteMessage
#                  - sqs:GetQueueAttributes
#                  - sqs:ListDeadLetterSourceQueues
#                Resource: !GetAtt SquarePaymentCreatedEventDLQueue.Arn

  OrderCreatedEventQueue:
    Type: AWS::SQS::Queue
    Properties:
#      RedrivePolicy:
#        deadLetterTargetArn: !GetAtt OrderCreatedEventDLQueue.Arn
#        maxReceiveCount: 5
      VisibilityTimeout: 60

#  OrderCreatedEventDLQueue:
#    Type: AWS::SQS::Queue

  OrderProcessedEventQueue:
    Type: AWS::SQS::Queue
    Properties:
#      RedrivePolicy:
#        deadLetterTargetArn: !GetAtt OrderProcessedEventDLQueue.Arn
#        maxReceiveCount: 5
      VisibilityTimeout: 60

#  OrderProcessedEventDLQueue:
#    Type: AWS::SQS::Queue

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
      Policies:
        - PolicyName: CloudwatchLogsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
        - PolicyName: DynamoDBReadWriteCoreDataPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                Effect: Allow
                Resource: !GetAtt CoreDataTable.Arn
        - PolicyName: DynamoDBStreamReadCoreDataPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Effect: Allow
                Resource: !GetAtt CoreDataTable.StreamArn
        - PolicyName: S3BucketReadWritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - s3:GetObject
                  - s3:GetObjectAcl
                  - s3:PutObject
                  - s3:PutObjectAcl
                Effect: Allow
                Resource:
                 - !GetAtt TicketsBucket.Arn
                 - !Sub '${TicketsBucket.Arn}/*'
                 - !GetAtt TemplatesBucket.Arn
                 - !Sub '${TemplatesBucket.Arn}/*'
                 - !GetAtt TenantFilesBucket.Arn
                 - !Sub '${TenantFilesBucket.Arn}/*'
        - PolicyName: SQSSendOrderProcessedEventQueuePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Effect: Allow
                Resource:
                  - !GetAtt SquarePaymentCreatedEventQueue.Arn
                  - !GetAtt OrderCreatedEventQueue.Arn
                  - !GetAtt OrderProcessedEventQueue.Arn

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 3
      LogGroupName: !Sub '/digitalvenue/functions/${Environment}'

  SquareEventsFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/square-events.zip
      FunctionName: !Sub "digitalvenue-square-events-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogGroup: !Ref LambdaLogGroup
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          SQUARE_WEBHOOK_NOTIFICATION_URL: !Sub 'https://api.${Environment}.digital-venue.net/events'
          CORE_DATA_TABLE_NAME: !Ref CoreDataTable
          ENVIRONMENT: !Ref Environment
          SQUARE_PAYMENT_CREATED_EVENT_QUEUE_URL: !GetAtt SquarePaymentCreatedEventQueue.QueueUrl

  SquareEventsFunctionIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SquareEventsFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  SquareEventsFunctionRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: POST /events
      Target: !Sub 'integrations/${SquareEventsFunctionIntegration}'

  SquareEventsFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SquareEventsFunction
      Principal: apigateway.amazonaws.com

  SquareEventGathererFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/square-event-gatherer.zip
      FunctionName: !Sub "digitalvenue-square-event-gatherer-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogGroup: !Ref LambdaLogGroup
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          CORE_DATA_TABLE_NAME: !Ref CoreDataTable
          ENVIRONMENT: !Ref Environment
          ORDER_CREATED_EVENT_QUEUE_URL: !GetAtt OrderCreatedEventQueue.QueueUrl

  SquareEventGathererFunctionSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt SquarePaymentCreatedEventQueue.Arn
      FunctionName: !Ref SquareEventGathererFunction

  TicketGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/ticket-generator.zip
      FunctionName: !Sub "digitalvenue-ticket-generator-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogGroup: !Ref LambdaLogGroup
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          CORE_DATA_TABLE_NAME: !Ref CoreDataTable
          S3_QR_CODE_BUCKET_NAME: !Ref TicketsBucket
          ENVIRONMENT: !Ref Environment
          ORDER_PROCESSED_QUEUE_URL: !GetAtt OrderProcessedEventQueue.QueueUrl

  TicketGeneratorFunctionSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrderCreatedEventQueue.Arn
      FunctionName: !Ref TicketGeneratorFunction

  TicketMailerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/ticket-mailer.zip
      FunctionName: !Sub "digitalvenue-ticket-mailer-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogGroup: !Ref LambdaLogGroup
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          CORE_DATA_TABLE_NAME: !Ref CoreDataTable
          S3_QR_CODE_BUCKET_NAME: !Ref TicketsBucket
          S3_TEMPLATES_BUCKET_NAME: !Ref TemplatesBucket
          S3_TENANT_FILES_BUCKET_NAME: !Ref TenantFilesBucket
          ENVIRONMENT: !Ref Environment

  TicketMailerFunctionSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrderProcessedEventQueue.Arn
      FunctionName: !Ref TicketMailerFunction

  PapertrailLogStreamerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/papertrail-log-streamer.zip
      FunctionName: !Sub "digitalvenue-papertrail-log-streamer-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          PAPERTRAIL_PUSH_URL: !Ref PapertrailLogPushURL
          ENVIRONMENT: !Ref Environment

  PapertrailLogStreamerFunctionLogsSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    DependsOn: PapertrailLogStreamerFunctionPermission
    Properties:
      DestinationArn: !GetAtt PapertrailLogStreamerFunction.Arn
      FilterPattern: ""
      LogGroupName: !Ref LambdaLogGroup

  PapertrailLogStreamerApiLogsSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    DependsOn: PapertrailLogStreamerFunctionPermission
    Properties:
      DestinationArn: !GetAtt PapertrailLogStreamerFunction.Arn
      FilterPattern: ""
      LogGroupName: !Ref ApiLogGroup

  PapertrailLogStreamerFunctionPermission:
    Type: AWS::Lambda::Permission
    DependsOn: PapertrailLogStreamerFunction
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PapertrailLogStreamerFunction
      Principal: logs.amazonaws.com
