AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Environment:
    Type: String
  CodeBucketName:
    Type: String
  Route53HostedZoneId:
    Type: String

Resources:

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'digitalvenue-${Environment}-api'
      ProtocolType: HTTP

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: !Ref Environment
      ApiId: !Ref Api
      AutoDeploy: true
      AccessLogSettings:
        Format: '{
                  "httpMethod": "$context.httpMethod",
                  "path": "$context.path",
                  "environment": "$context.stage",
                  "requestId": "$context.requestId",
                  "ip": "$context.identity.sourceIp",
                  "userAgent": "$context.identity.userAgent",
                  "latency": "$context.responseLatency",
                  "httpStatus": "$context.status",
                  "integrationError": "$context.integration.error",
                  "lambdaError": "$context.error.message"
        }'
        DestinationArn: !GetAtt ApiLogGroup.Arn

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join
        - '/'
        - - "digitalvenue"
          - !Ref Environment
          - "access-logs"

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: !Ref DomainName
      ApiId: !Ref Api
      Stage: !Ref ApiStage

  DnsRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Sub 'api.${Environment}.digital-venue.net'
      Type: A
      AliasTarget:
        DNSName: !GetAtt DomainName.RegionalDomainName
        HostedZoneId: !GetAtt DomainName.RegionalHostedZoneId

  DomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref DomainCertificate
          SecurityPolicy: TLS_1_2

  DomainCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainValidationOptions:
        - DomainName: !Sub 'api.${Environment}.digital-venue.net'
          HostedZoneId: !Ref Route53HostedZoneId
      ValidationMethod: DNS

  LamdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"

  HelloWorldFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/hello-world.zip
      FunctionName: !Sub "hello-world-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LamdaRole.Arn
      Runtime: provided.al2023

  HelloWorldIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HelloWorldFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  HelloWorldRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: GET /hello
      Target: !Sub 'integrations/${HelloWorldIntegration}'

  HelloWorldFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref HelloWorldFunction
      Principal: apigateway.amazonaws.com

  EchoFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/echo-service.zip
      FunctionName: !Sub "echo-service-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LamdaRole.Arn
      Runtime: provided.al2023

  EchoIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${EchoFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  EchoRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: POST /echo
      Target: !Sub 'integrations/${EchoIntegration}'

  EchoFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EchoFunction
      Principal: apigateway.amazonaws.com
