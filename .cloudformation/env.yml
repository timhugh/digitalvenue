AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Environment:
    Type: String
  CodeBucketName:
    Type: String
  Route53HostedZoneId:
    Type: String

Resources:

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'digitalvenue-${Environment}-api'
      ProtocolType: HTTP

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: !Ref Environment
      ApiId: !Ref Api
      AutoDeploy: true
      AccessLogSettings:
        Format: '{
                  "httpMethod": "$context.httpMethod",
                  "path": "$context.path",
                  "environment": "$context.stage",
                  "requestId": "$context.requestId",
                  "ip": "$context.identity.sourceIp",
                  "userAgent": "$context.identity.userAgent",
                  "latency": "$context.responseLatency",
                  "httpStatus": "$context.status",
                  "integrationError": "$context.integration.error",
                  "lambdaError": "$context.error.message"
        }'
        DestinationArn: !GetAtt ApiLogGroup.Arn

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 3
      LogGroupName: !Join
        - '/'
        - - "digitalvenue"
          - !Ref Environment
          - "access-logs"

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: !Ref DomainName
      ApiId: !Ref Api
      Stage: !Ref ApiStage

  DnsRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Sub 'api.${Environment}.digital-venue.net'
      Type: A
      AliasTarget:
        DNSName: !GetAtt DomainName.RegionalDomainName
        HostedZoneId: !GetAtt DomainName.RegionalHostedZoneId

  DomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref DomainCertificate
          SecurityPolicy: TLS_1_2

  DomainCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainValidationOptions:
        - DomainName: !Sub 'api.${Environment}.digital-venue.net'
          HostedZoneId: !Ref Route53HostedZoneId
      ValidationMethod: DNS

  CoreDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "core-data-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK # partition key
          AttributeType: S
        - AttributeName: SK # sort key
          AttributeType: S
        - AttributeName: CustomerID # CustomerID is on Customers, Orders, and Tickets
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: CustomerIDIndex
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: CustomerID
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  TicketsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "digitalvenue-tickets-${Environment}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
      Policies:
        - PolicyName: CloudwatchLogsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
        - PolicyName: DynamoDBReadWriteCoreDataPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Effect: Allow
                Resource: !GetAtt CoreDataTable.Arn
        - PolicyName: DynamoDBStreamReadCoreDataPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Effect: Allow
                Resource: !GetAtt CoreDataTable.StreamArn
        - PolicyName: S3ReadWriteTicketsBucketPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - s3:GetObject
                  - s3:GetObjectAcl
                  - s3:PutObject
                  - s3:PutObjectAcl
                Effect: Allow
                Resource:
                 - !GetAtt TicketsBucket.Arn
                 - !Sub '${TicketsBucket.Arn}/*'

  SquareEventServiceFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/square-events.zip
      FunctionName: !Sub "square-events-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogGroup: !Ref SquareEventServiceLogGroup
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          SQUARE_WEBHOOK_NOTIFICATION_URL: !Sub 'https://api.${Environment}.digital-venue.net/events'
          CORE_DATA_TABLE_NAME: !Ref CoreDataTable
          ENVIRONMENT: !Ref Environment

  SquareEventServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 3
      LogGroupName: !Join
        - '/'
        - - "digitalvenue"
          - !Ref Environment
          - "square-events-logs"

  SquareEventServiceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SquareEventServiceFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  SquareEventServiceRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: POST /events
      Target: !Sub 'integrations/${SquareEventServiceIntegration}'

  SquareEventServiceFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SquareEventServiceFunction
      Principal: apigateway.amazonaws.com

  SquareEventGathererFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/square-event-gatherer.zip
      FunctionName: !Sub "square-event-gatherer-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogGroup: !Ref SquareEventGathererLogGroup
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          CORE_DATA_TABLE_NAME: !Ref CoreDataTable
          ENVIRONMENT: !Ref Environment

  SquareEventGathererLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 3
      LogGroupName: !Join
        - '/'
        - - "digitalvenue"
          - !Ref Environment
          - "square-event-gatherer-logs"

  SquareEventGathererSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 1
      Enabled: true
      EventSourceArn: !GetAtt CoreDataTable.StreamArn
      FilterCriteria:
        Filters:
          - Pattern: "{\"eventName\":[\"INSERT\"],\"dynamodb\":{\"NewImage\":{\"Type\":{\"S\":[\"SquarePayment\"]}}}}"
      FunctionName: !Ref SquareEventGathererFunction
      StartingPosition: LATEST

  TicketGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/ticket-generator.zip
      FunctionName: !Sub "ticket-generator-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogGroup: !Ref TicketGeneratorLogGroup
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          CORE_DATA_TABLE_NAME: !Ref CoreDataTable
          TICKETS_BUCKET_NAME: !Ref TicketsBucket
          S3_QR_CODE_BUCKET_NAME: !Ref TicketsBucket
          ENVIRONMENT: !Ref Environment

  TicketGeneratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 3
      LogGroupName: !Join
        - '/'
        - - "digitalvenue"
          - !Ref Environment
          - "ticket-generator-logs"

  TicketGeneratorSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 1
      Enabled: true
      EventSourceArn: !GetAtt CoreDataTable.StreamArn
      FilterCriteria:
        Filters:
          - Pattern: "{\"eventName\":[\"INSERT\"],\"dynamodb\":{\"NewImage\":{\"Type\":{\"S\":[\"Order\"]}}}}"
      FunctionName: !Ref TicketGeneratorFunction
      StartingPosition: LATEST
