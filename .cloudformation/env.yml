AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Environment:
    Type: String
  CodeBucketName:
    Type: String
  Route53HostedZoneId:
    Type: String

Resources:

  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'digitalvenue-${Environment}-api'
      ProtocolType: HTTP

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: !Ref Environment
      ApiId: !Ref Api
      AutoDeploy: true
      AccessLogSettings:
        Format: '{
                  "httpMethod": "$context.httpMethod",
                  "path": "$context.path",
                  "environment": "$context.stage",
                  "requestId": "$context.requestId",
                  "ip": "$context.identity.sourceIp",
                  "userAgent": "$context.identity.userAgent",
                  "latency": "$context.responseLatency",
                  "httpStatus": "$context.status",
                  "integrationError": "$context.integration.error",
                  "lambdaError": "$context.error.message"
        }'
        DestinationArn: !GetAtt ApiLogGroup.Arn

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join
        - '/'
        - - "digitalvenue"
          - !Ref Environment
          - "access-logs"

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: !Ref DomainName
      ApiId: !Ref Api
      Stage: !Ref ApiStage

  DnsRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Sub 'api.${Environment}.digital-venue.net'
      Type: A
      AliasTarget:
        DNSName: !GetAtt DomainName.RegionalDomainName
        HostedZoneId: !GetAtt DomainName.RegionalHostedZoneId

  DomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref DomainCertificate
          SecurityPolicy: TLS_1_2

  DomainCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub 'api.${Environment}.digital-venue.net'
      DomainValidationOptions:
        - DomainName: !Sub 'api.${Environment}.digital-venue.net'
          HostedZoneId: !Ref Route53HostedZoneId
      ValidationMethod: DNS

  SquareMerchantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "merchants-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: SquareMerchantID
          AttributeType: S
      KeySchema:
        - AttributeName: SquareMerchantID
          KeyType: HASH

  SquarePaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "payments-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: SquarePaymentID
          AttributeType: S
      KeySchema:
        - AttributeName: SquarePaymentID
          KeyType: HASH

  SquarePaymentCreatedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "payment-created-${Environment}"
      MessageRetentionPeriod: 345600 # 4 days; default
      VisibilityTimeout: 30 # 30 seconds; default

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
      Policies:
        - PolicyName: CloudwatchLogsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
        - PolicyName: DynamoDBReadWriteMerchantsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Effect: Allow
                Resource: !GetAtt SquareMerchantsTable.Arn
        - PolicyName: DynamoDBReadWritePaymentsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Effect: Allow
                Resource: !GetAtt SquarePaymentsTable.Arn
        - PolicyName: SQSSendReceivePaymentCreatedQueuePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Effect: Allow
                Resource: !GetAtt SquarePaymentCreatedQueue.Arn

  EchoFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/echo.zip
      FunctionName: !Sub "echo-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023

  EchoIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${EchoFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  EchoRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: POST /echo
      Target: !Sub 'integrations/${EchoIntegration}'

  EchoFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EchoFunction
      Principal: apigateway.amazonaws.com

  SquareEventServiceFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: [ arm64 ]
      Code: ../build/square-events.zip
      FunctionName: !Sub "square-events-${Environment}"
      Handler: bootstrap
      LoggingConfig:
        LogFormat: JSON
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: provided.al2023
      Environment:
        Variables:
          WEBHOOK_NOTIFICATION_URL: !Sub 'https://api.${Environment}.digital-venue.net/events'
          MERCHANTS_TABLE_NAME: !Ref SquareMerchantsTable
          PAYMENTS_TABLE_NAME: !Ref SquarePaymentsTable
          PAYMENT_CREATED_QUEUE_URL: !GetAtt SquarePaymentCreatedQueue.QueueUrl

  SquareEventServiceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SquareEventServiceFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  SquareEventServiceRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: POST /events
      Target: !Sub 'integrations/${SquareEventServiceIntegration}'

  SquareEventServiceFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SquareEventServiceFunction
      Principal: apigateway.amazonaws.com
