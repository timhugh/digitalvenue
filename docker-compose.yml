version: "3.8"

services:
  dynamodb-local:
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath ./data
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    volumes:
      - ./.docker/dynamodb:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
    depends_on:
      - dynamodb-local

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  http-gateway:
    image: nginx:latest
    container_name: http-gateway
    ports:
      - "8080:80"
    volumes:
      - ./.docker/http-gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - square-events
      - square-event-gatherer
      - ticket-generator

  square-events:
    build:
      context: .
      dockerfile: .docker/function.Dockerfile
    container_name: square-events
    command: [ "go", "run", "./functions/square-events" ]
    volumes:
      - .:/digitalvenue
    depends_on:
      - dynamodb-local
    environment:
      LOCAL_DYNAMODB_URL: http://dynamodb-local:8000
      CORE_DATA_TABLE_NAME: core-data-dev
      SQUARE_WEBHOOK_NOTIFICATION_URL: https://localhost:9000/events
      LOG_LEVEL: debug

  square-event-gatherer:
    build:
      context: .
      dockerfile: .docker/function.Dockerfile
    container_name: square-event-gatherer
    command: [ "go", "run", "./functions/square-event-gatherer" ]
    volumes:
      - .:/digitalvenue
    depends_on:
      - dynamodb-local
    environment:
      LOCAL_DYNAMODB_URL: http://dynamodb-local:8000
      CORE_DATA_TABLE_NAME: core-data-dev
      LOG_LEVEL: debug

  ticket-generator:
    build:
      context: .
      dockerfile: .docker/function.Dockerfile
    container_name: ticket-generator
    command: [ "go", "run", "./functions/ticket-generator" ]
    volumes:
      - .:/digitalvenue
    depends_on:
      - dynamodb-local
    environment:
      LOCAL_DYNAMODB_URL: http://dynamodb-local:8000
      CORE_DATA_TABLE_NAME: core-data-dev
      LOG_LEVEL: debug
      S3_QR_CODE_BUCKET_NAME: digitalvenue-qr-codes
